name: Sync Telegram User Donations

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-telegram-user-donations
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Sync Telegram payment group
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_USER_SESSION: ${{ secrets.TG_USER_SESSION }}
          TG_USER_CHAT_ID: "-1003796814691"
          TG_USER_SYNC_LIMIT: "120"
        run: npm run telegram:sync

      - name: Commit donation data
        run: |
          if git diff --quiet -- public/data/donations.json src/data/donations.generated.json; then
            echo "No donation data changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/donations.json src/data/donations.generated.json
          git commit -m "chore: sync telegram donation data"
          git push
